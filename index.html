<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bike Shop</title>
  <meta name="description" content="Building algorithms that enhance human capacity. A research lab at the intersection of economics and computer science." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta property="og:title" content="The Bike Shop" />
  <meta property="og:description" content="Building algorithms that enhance human capacity. A research lab at the intersection of economics and computer science." />
  <meta property="og:url" content="https://thebikeshop.io" />
  <meta property="og:image" content="https://thebikeshop.io/og-image-square.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Bike Shop" />
  <meta name="twitter:description" content="Building algorithms that enhance human capacity. A research lab at the intersection of economics and computer science." />
  <meta name="twitter:image" content="https://thebikeshop.io/og-image-square.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --soil: #4D271B;
      --eggshell: #FFF6D4;
      --eggshell-dim: rgba(255,246,212,0.75);
      --eggshell-faint: rgba(255,246,212,0.15);
    }

    html, body { height: 100%; background: var(--soil); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }

    /* SKIP LINK */
    .skip-link { position: absolute; top: -100px; left: 1rem; z-index: 9999; background: var(--soil); color: var(--eggshell); padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 700; text-decoration: none; border-radius: 0 0 4px 4px; transition: top 0.2s; }
    .skip-link:focus { top: 0; }

    /* BACKGROUND */
    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

    /* PAGE */
    .page { position: relative; z-index: 2; min-height: 100dvh; display: flex; flex-direction: column; }

    /* NAV */
    .nav {
      position: absolute; top: 0; right: 0; z-index: 10;
      padding: 1.4rem 2.2rem;
      display: flex; align-items: center; gap: 0;
      -webkit-transform: translateZ(0); transform: translateZ(0); will-change: transform;
    }
    .nav a { color: #FFFDF4; text-decoration: none; font-size: 1.05rem; font-weight: 700; opacity: 1; transition: opacity 0.2s; }
    .nav a:hover { opacity: 0.75; }
    .nav-pipe { color: rgba(255,253,244,0.5); font-weight: 300; font-size: 1.1rem; padding: 0 1rem; user-select: none; }

    /* HAMBURGER */
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 300; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #FFFDF4; border-radius: 2px; transition: all 0.2s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* DROPDOWN */
    .dropdown { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 250; background: rgba(30,15,8,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,246,212,0.12); padding: 5rem 2rem 2rem; flex-direction: column; }
    .dropdown.open { display: flex; }
    .dropdown a { color: #FFFDF4; text-decoration: none; font-size: 1.2rem; font-weight: 700; opacity: 0.6; padding: 1rem 0; border-bottom: 1px solid rgba(255,246,212,0.1); transition: opacity 0.2s; }
    .dropdown a:last-child { border-bottom: none; }
    .dropdown a:hover { opacity: 1; }

    /* CONTENT */
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem 4rem; text-align: center; }
    .logo { width: min(520px, 72vw); height: auto; margin-bottom: 1.4rem; }
    .tagline { font-family: Georgia, serif; font-style: italic; font-size: 1.1rem; color: #FFFDF4; line-height: 1.5; margin-bottom: 0; }



    @media (prefers-reduced-motion: reduce) { .logo, .tagline { animation: none; opacity: 1; transform: none; } }

    @media (max-width: 600px) {
      .nav { padding: 1rem 1.5rem; }
      .nav a, .nav-pipe { display: none; }
      .hamburger { display: flex; }
      .footer { grid-template-columns: 1fr; gap: 1.25rem; padding: 1.5rem; }
      .footer-right { align-items: flex-start; }
    }
  </style>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>

<div class="bg">
    <img src="Bike-Shop-splash-light.jpg" alt="" role="presentation" />
  </div>

<div class="page">

  <nav class="nav" aria-label="Main navigation">
    <a href="what-we-do.html">What we do</a>
    <span class="nav-pipe">|</span>
    <a href="people.html">People</a>
    <span class="nav-pipe">|</span>
    <a href="projects.html">Projects</a>
    <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="dropdown" id="dropdown">
    <a href="what-we-do.html">What we do</a>
    <a href="people.html">People</a>
    <a href="projects.html">Projects</a>
  </div>

  <main class="content" id="main">
    <img class="logo"
         src="MIT_THEBIKESHOP_LOGO-EGGSHELL.png"
         alt="The Bike Shop" />
    <p class="tagline">Building algorithms that enhance human capacity</p>
  </main>

</div>


<script>
window.toggleMenu = function() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('dropdown').classList.toggle('open');
};
document.addEventListener('click', function(e) {
  var btn = document.getElementById('hamburger');
  var drop = document.getElementById('dropdown');
  if (drop.classList.contains('open') && !drop.contains(e.target) && !btn.contains(e.target)) {
    btn.classList.remove('open');
    drop.classList.remove('open');
  }
});
</script>

</body>
</html>
